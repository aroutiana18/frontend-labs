<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/Mini_calculatrice.css">
    <link rel="stylesheet" href="../fontAwesome/css/all.min.css">
    <title>Calculatrice1</title>
</head>
<body>
    <div class="calculator">
        <input id="champ" readonly>
            
            <div class="Afaire">

                <button class="operation" onclick="appendToChamp('+')">+</button> 
                <button onclick="appendToChamp('7')">7</button> 
                <button onclick="appendToChamp('8')">8</button> 
                <button onclick="appendToChamp('9')">9</button>
                

                <button class="operation" onclick="appendToChamp('-')">-</button>
                <button onclick="appendToChamp('6')">6</button>
                <button onclick="appendToChamp('5')">5</button>
                <button onclick="appendToChamp('4')">4</button> 


                <button class="operation" onclick="appendToChamp('*')">x</button>
                <button onclick="appendToChamp('3')">3</button>
                <button onclick="appendToChamp('2')">2</button>
                <button onclick="appendToChamp('1')">1</button>
               
                
                <button class="operation" onclick="appendToChamp('/')">/</button>
                <button onclick="appendToChamp('.')">.</button>
                <button onclick="appendToChamp('0')">0</button>
                <button onclick="calculate()">=</button>


                <button class="operation" onclick="supprimer()"><i class="fa-solid fa-backspace"></i></button>
                <button onclick="appendToChamp('(')">(</button>
                <button onclick="appendToChamp(')')">)</button>

                <button class="operation"  onclick="reset()">    
                    <svg  xmlns="http://www.w3.org/2000/svg" width="45" height="45"  
                        fill="currentColor" viewBox="0 0 24 24" >
                        <!--Boxicons v3.0 https://boxicons.com | License  https://docs.boxicons.com/free-->
                        <path d="m17,6v-2c0-1.1-.9-2-2-2h-6c-1.1,0-2,.9-2,2v2H2v2h2v12c0,1.1.9,2,2,2h12c1.1,0,2-.9,2-2v-12h2v-2h-5Zm-8-2h6v2h-6v-2Zm9,16H6v-12h12v12Z"></path><path d="M14.29 10.29 12 12.59 9.71 10.29 8.29 11.71 10.59 14 8.29 16.29 9.71 17.71 12 15.41 14.29 17.71 15.71 16.29 13.41 14 15.71 11.71 14.29 10.29z"></path>
                     </svg>
                </button>

            </div>
            
       
      
    </div>

    <div class="version">
        <p>Made by Arotiana  &copy; Juin 2025</p>
    </div>

    <script src="../JAVASCRIPT/Mini_calculatrice.js"></script>
</body>
</html>
